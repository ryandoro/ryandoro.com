<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>$title | Ryan Doro</title>
  <meta name="description" content="$description">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>

  <div class="site">
    <aside class="sidebar">
      <header class="site-header" role="banner" data-shared-header="true" data-root-prefix="../"></header>

      <div id="secondary" class="secondary" data-shared-nav="true" data-root-prefix="../"></div>
    </aside>

    <div id="content" class="site-content">
      <main class="site-main">
        <article class="post">
          <header class="post-hero"$hero_style>
            <div class="post-hero__content">
              <p class="hero-kicker reveal">Mindset &amp; Wellness</p>
              <h1 class="reveal reveal-delay-1">$title</h1>
              <p class="post-meta reveal reveal-delay-2">$date · $creator</p>
            </div>
          </header>

          <section class="post-body">
            <div class="panel-inner">
              $featured
              <div class="post-content">
                $content
              </div>
              <div class="post-footer">
                <a class="post-back" href="../blog.html">Back to blog</a>
              </div>
            </div>
          </section>
        </article>
      </main>

      <footer class="site-footer" role="contentinfo" data-shared-footer="true" data-root-prefix="../"></footer>
    </div>
  </div>
  <script src="../shared-layout.js"></script>
</body>
</html>
